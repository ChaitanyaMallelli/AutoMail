<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Sign In | JobFlow AI</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.1/font/bootstrap-icons.css" />
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap" rel="stylesheet" />
    <style>
        *, *::before, *::after { box-sizing:border-box; margin:0; padding:0; }
        :root {
            --bg-base:#09090b; --bg-elevated:#111118; --bg-card:#16161f;
            --border:rgba(255,255,255,0.07); --border-hover:rgba(124,58,237,0.35);
            --accent-violet:#7c3aed; --accent-indigo:#6366f1; --accent-pink:#ec4899;
            --grad-primary:linear-gradient(135deg,#7c3aed 0%,#6366f1 100%);
            --grad-hot:linear-gradient(135deg,#ec4899 0%,#7c3aed 100%);
            --glow-violet:0 0 20px rgba(124,58,237,0.35); --glow-sm:0 0 12px rgba(124,58,237,0.2);
            --text-primary:#f4f4f5; --text-secondary:#a1a1aa; --text-muted:#52525b;
            --danger:#ef4444; --danger-bg:rgba(239,68,68,0.12);
            --radius-sm:6px; --radius-md:10px; --radius-lg:14px; --radius-xl:20px;
        }
        html, body { height:100%; }
        body { font-family:'Inter',-apple-system,sans-serif; background:var(--bg-base); color:var(--text-primary); min-height:100vh; }
        .login-page { min-height:100vh; display:flex; align-items:center; justify-content:center; position:relative; overflow:hidden; padding:24px 16px; }
        .orb { position:absolute; border-radius:50%; filter:blur(120px); pointer-events:none; opacity:0; animation:orbFadeIn 1.6s ease forwards; }
        .orb-1 { width:560px; height:560px; background:radial-gradient(circle,rgba(124,58,237,0.28) 0%,transparent 70%); top:-140px; left:-120px; animation-delay:0s; }
        .orb-2 { width:480px; height:480px; background:radial-gradient(circle,rgba(236,72,153,0.22) 0%,transparent 70%); bottom:-100px; right:-100px; animation-delay:0.25s; }
        .orb-3 { width:320px; height:320px; background:radial-gradient(circle,rgba(99,102,241,0.18) 0%,transparent 70%); top:50%; left:58%; transform:translate(-50%,-50%); animation-delay:0.5s; }
        @keyframes orbFadeIn { to { opacity:1; } }
        .login-card { position:relative; z-index:10; width:100%; max-width:420px; background:var(--bg-card); border:1px solid var(--border); border-radius:var(--radius-xl); padding:48px 40px; box-shadow:0 0 0 1px rgba(124,58,237,0.06),0 32px 72px rgba(0,0,0,0.55),var(--glow-sm); animation:cardSlideUp 0.55s cubic-bezier(0.22,1,0.36,1) both; }
        @keyframes cardSlideUp { from { opacity:0; transform:translateY(32px); } to { opacity:1; transform:translateY(0); } }
        .logo-wrap { width:56px; height:56px; border-radius:50%; background:var(--grad-primary); display:flex; align-items:center; justify-content:center; margin:0 auto 24px; box-shadow:var(--glow-violet); flex-shrink:0; }
        .logo-wrap i { font-size:1.6rem; color:#fff; }
        .card-title { font-size:28px; font-weight:700; color:var(--text-primary); text-align:center; line-height:1.2; margin-bottom:8px; }
        .card-subtitle { font-size:14px; color:var(--text-muted); text-align:center; line-height:1.5; margin-bottom:36px; }
        .input-label { display:block; font-size:11px; font-weight:600; text-transform:uppercase; letter-spacing:1.3px; color:var(--text-secondary); margin-bottom:10px; }
        .passcode-wrap { position:relative; margin-bottom:20px; }
        .passcode-input { width:100%; height:56px; background:var(--bg-elevated); border:1px solid var(--border); border-radius:var(--radius-lg); color:var(--text-primary); font-family:'Inter',monospace; font-size:24px; letter-spacing:8px; text-align:center; padding:0 52px 0 16px; outline:none; transition:border-color .22s,box-shadow .22s; caret-color:var(--accent-violet); }
        .passcode-input::placeholder { letter-spacing:5px; font-size:18px; color:var(--text-muted); }
        .passcode-input:focus { border-color:var(--border-hover); box-shadow:0 0 0 3px rgba(124,58,237,0.15),var(--glow-sm); }
        .toggle-visibility { position:absolute; right:14px; top:50%; transform:translateY(-50%); background:none; border:none; color:var(--text-muted); font-size:1.05rem; cursor:pointer; padding:4px; line-height:1; transition:color .2s; }
        .toggle-visibility:hover { color:var(--accent-violet); }
        .btn-glow { display:flex; align-items:center; justify-content:center; gap:8px; width:100%; height:48px; background:var(--grad-primary); border:none; border-radius:var(--radius-lg); color:#fff; font-family:'Inter',-apple-system,sans-serif; font-size:15px; font-weight:600; letter-spacing:0.02em; cursor:pointer; position:relative; overflow:hidden; transition:transform .2s,box-shadow .2s; box-shadow:0 4px 20px rgba(124,58,237,0.4),0 0 0 1px rgba(124,58,237,0.22); }
        .btn-glow::before { content:''; position:absolute; inset:0; background:linear-gradient(135deg,rgba(255,255,255,0.13) 0%,transparent 55%); pointer-events:none; }
        .btn-glow:hover { transform:translateY(-2px); box-shadow:0 8px 32px rgba(124,58,237,0.55),0 0 0 1px rgba(124,58,237,0.35),var(--glow-violet); }
        .btn-glow:active { transform:translateY(0); box-shadow:0 2px 12px rgba(124,58,237,0.3); }
        .error-alert { display:flex; align-items:center; gap:9px; background:var(--danger-bg); border:1px solid rgba(239,68,68,0.28); border-radius:var(--radius-md); color:#fca5a5; font-size:13px; line-height:1.45; padding:11px 14px; margin-bottom:20px; animation:shakeIn 0.42s ease; }
        .error-alert i { color:var(--danger); font-size:15px; flex-shrink:0; }
        @keyframes shakeIn { 0%{transform:translateX(0);} 18%{transform:translateX(-7px);} 36%{transform:translateX(7px);} 54%{transform:translateX(-4px);} 72%{transform:translateX(4px);} 100%{transform:translateX(0);} }
        .login-footer { display:flex; align-items:center; justify-content:center; gap:6px; margin-top:24px; font-size:11px; color:var(--text-muted); }
        .login-footer i { font-size:10px; }
        @media (max-width:480px) { .login-card { padding:36px 24px 32px; } .card-title { font-size:24px; } .passcode-input { font-size:20px; letter-spacing:6px; } }
    </style>
</head>
<body>
    <div class="login-page">
        <div class="orb orb-1"></div>
        <div class="orb orb-2"></div>
        <div class="orb orb-3"></div>
        <div class="login-card">
            <div class="logo-wrap"><i class="bi bi-briefcase-fill"></i></div>
            <h1 class="card-title">Welcome Back</h1>
            <p class="card-subtitle">Enter your passcode to access JobFlow AI</p>
            {% if error %}
            <div class="error-alert"><i class="bi bi-exclamation-triangle-fill"></i><span>{{ error }}</span></div>
            {% endif %}
            <form method="post" action="/Login/Submit">
                <label class="input-label" for="passcode">Passcode</label>
                <div class="passcode-wrap">
                    <input id="passcode" type="password" name="passcode" class="passcode-input" placeholder="••••••" required autocomplete="current-password" autofocus />
                    <button type="button" class="toggle-visibility" onclick="togglePasscode(this)" aria-label="Toggle passcode visibility"><i class="bi bi-eye"></i></button>
                </div>
                <button type="submit" class="btn-glow">Sign In <i class="bi bi-arrow-right"></i></button>
            </form>
            <div class="login-footer"><i class="bi bi-shield-lock-fill"></i> Authorized access only &mdash; activity is monitored</div>
        </div>
    </div>
    <script>
        function togglePasscode(btn) {
            const input = document.getElementById('passcode');
            const icon = btn.querySelector('i');
            if (input.type === 'password') { input.type = 'text'; icon.className = 'bi bi-eye-slash'; }
            else { input.type = 'password'; icon.className = 'bi bi-eye'; }
        }
    </script>
</body>
</html>
